<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso Familiar — Aprende Claude</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F4EEE1;
    --card: #FFFFFF;
    --ink: #2B2620;
    --ink-soft: #7A7166;
    --line: #ECE4D4;
    --lime: #B7CF3D;
    --lime-soft: #EEF3D6;
    --sky: #4FA8D8;
    --sky-soft: #E1F0F8;
    --lavender: #9C86D8;
    --lavender-soft: #EBE6F8;
    --teal: #2E9E92;
    --teal-soft: #DDF2EF;
    --gold: #DDA13A;
    --gold-soft: #FBEED9;
    --coral: #E2694A;
    --coral-soft: #FBE3DC;
    --rose: #C97B8E;
    --rose-soft: #F5E3E8;
    --olive: #8A9A4E;
    --olive-soft: #ECEEDA;
    --radius: 24px;
  }
  *{box-sizing:border-box;}
  html{font-size:18px;}
  body{
    margin:0;
    font-family:'Manrope',sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:44px 28px 90px;
  }
  .shell{
    max-width:1480px;
    margin:0 auto;
    background:var(--card);
    border-radius:32px;
    box-shadow:0 16px 56px rgba(43,38,32,0.10);
    overflow:hidden;
  }
  header.top{
    padding:48px 60px 36px;
    border-bottom:1px solid var(--line);
  }
  header.top h1{
    margin:0 0 8px;
    font-size:44px;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  header.top p{
    margin:0 0 24px;
    color:var(--ink-soft);
    font-size:21px;
  }
  .progress-row{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .progress-track{
    flex:1;
    height:14px;
    border-radius:999px;
    background:var(--line);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--teal), var(--lime));
    border-radius:999px;
    transition:width .4s ease;
  }
  .progress-label{
    font-size:18px;
    font-weight:700;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .layout{
    display:flex;
    align-items:stretch;
    min-height:620px;
  }
  nav.sidebar{
    width:400px;
    flex-shrink:0;
    padding:32px 24px;
    border-right:1px solid var(--line);
    overflow-y:auto;
    max-height:80vh;
  }
  .module-block{margin-bottom:26px;}
  .module-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:16px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.05em;
    padding:11px 16px;
    border-radius:12px;
    margin-bottom:10px;
  }
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .subgroup-title{
    font-size:15px;
    font-weight:800;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.04em;
    margin:16px 6px 8px;
    padding-left:10px;
    border-left:4px solid var(--line);
    line-height:1.3;
  }
  .chapter-btn{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    padding:14px 14px;
    border-radius:14px;
    cursor:pointer;
    font-family:inherit;
    font-size:18px;
    line-height:1.3;
    color:var(--ink);
    margin-bottom:3px;
  }
  .chapter-btn:hover{background:var(--bg);}
  .chapter-btn.active{background:var(--ink);color:#fff;}
  .chapter-btn .num{
    font-size:14px;
    font-weight:800;
    color:var(--ink-soft);
    width:24px;
    flex-shrink:0;
  }
  .chapter-btn.active .num{color:rgba(255,255,255,0.6);}
  .check{
    width:22px;height:22px;border-radius:50%;
    border:2.5px solid var(--line);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .chapter-btn.done .check{background:var(--teal);border-color:var(--teal);}
  .chapter-btn.done .check:after{content:"✓";color:#fff;font-size:13px;font-weight:800;}
  .chapter-btn.active .check{border-color:rgba(255,255,255,0.5);}
  .chapter-btn[disabled]{opacity:.45;cursor:default;}

  main.content{
    flex:1;
    padding:56px 68px;
    overflow-y:auto;
    max-height:80vh;
  }
  .chapter-header{margin-bottom:30px;}
  .chapter-eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:16px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.05em;
    padding:8px 18px;
    border-radius:999px;
    margin-bottom:16px;
  }
  .chapter-header h2{
    margin:0;
    font-size:46px;
    font-weight:800;
    letter-spacing:-0.01em;
    line-height:1.15;
  }
  section.block{margin-bottom:30px;}
  .block-label{
    font-size:16px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--ink-soft);
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .block p{margin:0 0 14px;line-height:1.65;font-size:22px;}
  .block ul{margin:0 0 14px;padding-left:26px;line-height:1.65;font-size:22px;}
  .card-def{
    background:var(--bg);
    border-radius:18px;
    padding:24px 28px;
  }
  .example-box{
    background:var(--sky-soft);
    border-left:5px solid var(--sky);
    border-radius:12px;
    padding:18px 22px;
    margin-bottom:14px;
    font-size:20px;
    line-height:1.5;
  }
  .pitfall-box{
    background:var(--coral-soft);
    border-left:5px solid var(--coral);
    border-radius:12px;
    padding:18px 22px;
    font-size:20px;
    line-height:1.5;
  }
  .exercise-box{
    background:var(--lime-soft);
    border:2.5px dashed var(--lime);
    border-radius:18px;
    padding:26px 28px;
  }
  .exercise-box p{margin:0 0 18px;font-size:22px;line-height:1.5;}
  .complete-btn{
    background:var(--ink);
    color:#fff;
    border:none;
    padding:14px 26px;
    border-radius:999px;
    font-family:inherit;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
  }
  .complete-btn.done{background:var(--teal);}
  .placeholder{
    background:var(--bg);
    border-radius:18px;
    padding:56px;
    text-align:center;
    font-size:20px;
    color:var(--ink-soft);
  }
  .chapter-nav{
    display:flex;
    justify-content:space-between;
    margin-top:38px;
    padding-top:26px;
    border-top:1px solid var(--line);
  }
  .nav-btn{
    background:none;
    border:2px solid var(--line);
    padding:13px 22px;
    border-radius:999px;
    font-family:inherit;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    color:var(--ink);
  }
  .nav-btn:hover{border-color:var(--ink);}
  .nav-btn[disabled]{opacity:.3;cursor:default;}
  .chapter-header, section.block, .chapter-nav{max-width:900px;}
  .class-mode-btn{
    background:var(--ink);
    color:#fff;
    border:none;
    padding:12px 24px;
    border-radius:999px;
    font-family:inherit;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    white-space:nowrap;
  }
  .class-mode-btn:hover{opacity:.88;}

  /* ---------- Modo Clase (presentación, una idea a la vez) ---------- */
  .preso-view{display:none;flex-direction:column;min-height:640px;}
  .preso-view.active{display:flex;}
  .preso-topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 48px;border-bottom:1px solid var(--line);
  }
  .preso-info{
    font-size:16px;font-weight:800;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.04em;
  }
  .preso-exit-btn{
    background:none;border:2px solid var(--line);padding:10px 22px;
    border-radius:999px;font-family:inherit;font-weight:700;font-size:16px;
    cursor:pointer;color:var(--ink);
  }
  .preso-exit-btn:hover{border-color:var(--ink);}
  .preso-slide{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:40px 80px;
  }
  .preso-slide-inner{max-width:1020px;width:100%;}
  .preso-label{
    display:inline-flex;align-items:center;gap:10px;
    font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
    padding:10px 24px;border-radius:999px;margin-bottom:30px;
  }
  .preso-title-icon{font-size:76px;display:block;margin-bottom:18px;}
  .preso-title-text{font-size:56px;font-weight:800;line-height:1.15;letter-spacing:-0.01em;}
  .preso-body{font-size:32px;line-height:1.55;}
  .preso-body.card{background:var(--bg);border-radius:24px;padding:36px 40px;}
  .preso-complete-btn{margin-top:30px;font-size:20px;padding:16px 28px;}
  .preso-nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:24px 48px;border-top:1px solid var(--line);
  }
  .preso-arrow-btn{
    background:var(--ink);color:#fff;border:none;width:68px;height:68px;
    border-radius:50%;font-size:28px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .preso-arrow-btn:disabled{opacity:.22;cursor:default;}
  .preso-dots{font-size:17px;font-weight:700;color:var(--ink-soft);}
  @media (max-width:900px){
    .preso-slide{padding:28px 30px;}
    .preso-title-icon{font-size:52px;}
    .preso-title-text{font-size:36px;}
    .preso-body{font-size:21px;}
    .preso-topbar, .preso-nav{padding:16px 22px;}
  }
  @media (max-width:900px){
    .layout{flex-direction:column;}
    nav.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--line);max-height:320px;}
    main.content{max-height:none;padding:32px 26px;}
    header.top{padding:32px 28px 24px;}
    header.top h1{font-size:30px;}
    .chapter-header h2{font-size:32px;}
    .block p, .block ul, .example-box, .pitfall-box, .exercise-box p{font-size:17px;}
  }
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <h1>📚 Curso Familiar — Aprende Claude</h1>
    <p>De lo macro a lo específico: de "¿qué es esto?" a construir tu propio proyecto.</p>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0 capítulos</div>
      <button class="class-mode-btn" onclick="togglePreso()">🎤 Modo clase</button>
    </div>
  </header>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content" id="content"></main>
  </div>
  <section class="preso-view" id="presoView"></section>
</div>

<script>
const MODULE_COLORS = {
  mStart: {name:'teal', var:'--teal', soft:'--teal-soft'},
  m0: {name:'coral', var:'--coral', soft:'--coral-soft'},
  m1: {name:'sky', var:'--sky', soft:'--sky-soft'},
  m2: {name:'gold', var:'--gold', soft:'--gold-soft'},
  m3: {name:'lavender', var:'--lavender', soft:'--lavender-soft'},
  m4: {name:'olive', var:'--olive', soft:'--olive-soft'},
  m5: {name:'rose', var:'--rose', soft:'--rose-soft'}
};

const COURSE = [
{
  id:'m0', title:'Módulo 0 — Fundamentos', color:'m0',
  chapters:[
    {
      icon:'🧠', title:'¿Qué es esto que estamos usando?',
      tech:'Claude es un modelo de lenguaje grande (LLM): una red neuronal entrenada con enormes cantidades de texto para predecir, token por token, cuál es la continuación estadísticamente más probable de un texto dado su contexto. Ese proceso de predicción, repetido miles de veces por respuesta, genera algo que se lee como una conversación coherente.',
      simple:'Es un programa que adivina la próxima palabra, una y otra vez, tan bien entrenado que el resultado parece una persona pensando. No "sabe" nada como tú sabes algo — calcula probabilidades sobre patrones de texto que vio durante su entrenamiento.',
      explanation:[
        'Acá está el punto central de este capítulo: <strong>el modelo no es inteligente en el sentido humano — el inteligente eres tú.</strong> Claude no tiene intención propia, ni conciencia de qué le importa a tu familia, ni sabe qué proyecto vale la pena de verdad para ti. Lo que tiene es una capacidad enorme de generar lenguaje, código y estructura de forma coherente y útil.',
        'La inteligencia real — el juicio, el propósito, el "para qué quiero esto" — la pones tú. Claude es el motor; tú manejas. Entender esto no menosprecia la herramienta: al revés, es lo que te permite usarla bien. Cuando sabes que es un predictor de patrones y no un oráculo, dejas de esperar que "adivine" lo que quieres y empiezas a decírselo con precisión (eso es "prompting" — más adelante, en el capítulo de Prompt y prompting).'
      ],
      examples:[
        'Si escribes "El agua hierve a 100 grados" y le pides que continúe, el modelo no "sabe" de física — vio ese dato asociado a ese contexto millones de veces y predice que la frase natural sigue con "a nivel del mar".',
        'Si le preguntas "¿qué opinas tú, de verdad, sobre esto?", no tiene una opinión propia guardada en alguna parte — genera la respuesta más coherente con el patrón de "cómo respondería alguien reflexivo a esa pregunta".'
      ],
      pitfall:'Un error común es tratar las respuestas de Claude como si vinieran de un juicio propio ("Claude cree que...", "Claude quiere..."). Es más preciso decir "Claude generó esta respuesta" — el peso del juicio sigue siendo tuyo.',
      exercise:'Explícale a alguien de la familia, en una sola frase, la diferencia entre "Claude es inteligente" y "Claude predice patrones, tú aportas la inteligencia". Escribe esa frase aquí abajo (mentalmente o en tu tarea real) antes de marcar como completado.'
    },
    {
      icon:'👻', title:'Alucinaciones',
      tech:'Una "alucinación" es cuando un modelo genera información que suena plausible y segura, pero es objetivamente incorrecta o inventada — consecuencia directa de ser un predictor de patrones (ver "¿Qué es esto que estamos usando?") y no una base de datos de hechos verificados.',
      simple:'Es cuando Claude "se lo inventa" con total seguridad, sin darse cuenta de que está equivocado.',
      explanation:[
        'Esto conecta directo con "¿Qué es esto que estamos usando?": como el modelo predice la continuación más probable de un texto, a veces esa continuación probable no es la verdadera. Es más frecuente con datos muy específicos (fechas exactas, cifras, nombres poco comunes) o temas donde el modelo tiene poca información confiable.',
        'Por eso conviene verificar datos críticos, especialmente en temas técnicos, legales, médicos o financieros — y por eso conviene tener esto presente desde ya, antes de hacer cualquiera de los ejercicios del resto del curso.'
      ],
      examples:[
        'Pedir una cita textual exacta de un libro específico es un escenario de alto riesgo — puede generar una frase creíble que el libro nunca dijo.',
        'Pedir una cifra estadística muy específica sin fuente puede generar un número plausible pero no verificado.'
      ],
      pitfall:'La confianza con la que Claude dice algo no es un indicador de qué tan correcto es — puede sonar igual de seguro estando en lo correcto o alucinando.',
      exercise:'Pídele a Claude un dato muy específico (una fecha exacta, una cifra) sobre algo que tú sepas de memoria, y verifica si acertó.'
    },
    {
      icon:'⚙️', title:'Los motores: Haiku, Sonnet, Opus',
      tech:'Anthropic no ofrece un solo modelo, sino una familia de modelos del mismo linaje ("Claude") en distintos tamaños, cada uno optimizado para un balance distinto entre velocidad, costo y profundidad de razonamiento. Hoy esa familia incluye, de menor a mayor, Haiku, Sonnet y Opus. Los números de versión cambian con el tiempo, pero la lógica de los tres tamaños se mantiene.',
      simple:'Son como motores de auto. Haiku es el motor chico: parte al tiro, gasta poco, rinde perfecto para el trayecto corto. Sonnet es el motor equilibrado: el que usarías para casi todo, todos los días. Opus es el motor grande: más lento y "caro", pero con la potencia para los problemas difíciles de verdad.',
      explanation:[
        'No existe "el mejor motor" en abstracto — existe el motor correcto para la tarea. Haiku sirve para tareas simples y de alto volumen: responder algo corto, clasificar, resumir un mensaje. Sonnet es el caballo de batalla para escribir, programar, analizar y conversar — este mismo curso corre sobre Sonnet. Opus se justifica cuando la profundidad importa más que la velocidad: razonamiento complejo, investigación, decisiones con muchas variables cruzadas.',
        'Elegir el motor no es "cuál es más inteligente", es "qué tan complejo es lo que estoy pidiendo, y cuánto me importa la velocidad versus la profundidad de la respuesta".'
      ],
      examples:[
        '"Resume este mensaje de WhatsApp en una frase" → Haiku sobra y sobra.',
        '"Ayúdame a pensar la arquitectura completa de mi proyecto familiar, considerando seguridad, costos y qué pasa si en 2 años somos 20 usando esto" → ahí se justifica Opus.'
      ],
      pitfall:'Usar siempre el motor más grande "por si acaso" no es gratis: es más lento y menos eficiente para tareas simples. La habilidad real es saber calibrar.',
      exercise:'Piensa en 3 tareas que le pedirías a Claude esta semana. Para cada una decide: ¿Haiku, Sonnet u Opus? Justifica tu elección en una línea por tarea.'
    },
    {
      icon:'🚪', title:'Las puertas de entrada: Chat, Cowork, Code',
      tech:'Son las tres superficies principales para acceder a Claude, cada una diseñada para un tipo de trabajo distinto. Chat: interfaz conversacional (web, app móvil o de escritorio) para diálogo directo, ideas y contenido. Cowork: app de escritorio de trabajo agéntico, donde Claude ejecuta tareas de varios pasos por encargo. Claude Code: herramienta agéntica especializada en programar, para delegar tareas de código desde terminal, editor o app de escritorio/móvil. A esto se suman extensiones: Claude en Chrome, Excel y PowerPoint.',
      simple:'Chat es hablar con Claude. Cowork es encargarle una pega larga y dejar que la resuelva sola, como un asistente que trabaja en otra pieza. Code es la versión especializada para programar — la que se usó para construir curso.html.',
      explanation:[
        'La elección depende de la naturaleza de la tarea, no de "cuál es mejor". Si necesitas pensar en voz alta, redactar o resolver una duda puntual → Chat. Si necesitas que algo se ejecute solo con múltiples pasos y herramientas (buscar, organizar, escribir varios documentos) → Cowork. Si el resultado final es código → Claude Code.',
        'Todas comparten el mismo "cerebro" (los modelos Claude) — lo que cambia es el andamiaje alrededor: qué herramientas tiene disponibles y cómo estructura su trabajo. Existe además una cuarta forma de acceso, más técnica: la API, que permite que un programa propio use a Claude directamente, sin pasar por ninguna de estas 3 interfaces — se ve en detalle más adelante en el curso.'
      ],
      examples:[
        'Pensar el contenido pedagógico de este curso → Chat (como esta misma conversación).',
        'Escribir y depurar el archivo curso.html → Claude Code.'
      ],
      pitfall:'No es necesario elegir "una sola puerta para siempre" — muchos proyectos reales usan las tres en distintos momentos de su desarrollo.',
      exercise:'De las 3 puertas, ¿cuál usarías para: (a) escribir una carta a un familiar, (b) organizar una lista de 40 invitados para un evento, (c) armar una pequeña calculadora? Asigna una puerta a cada tarea.'
    }
  ]
},
{
  id:'mStart', title:'Módulo 1 — Primeros pasos', color:'mStart',
  chapters:[
    {
      icon:'🔑', title:'Crear tu cuenta y tu plan',
      tech:'Para usar Claude hace falta una cuenta en claude.ai asociada a un correo. Anthropic ofrece varios planes — Free, Pro, Max, Team y Enterprise — que se diferencian principalmente en cuántos mensajes puedes mandar antes de topar el límite de uso, qué modelos puedes elegir, y qué funciones tienes disponibles (Proyectos, Skills, Cowork, etc.).',
      simple:'Es como cualquier otra cuenta: un correo, una clave, y listo. La diferencia entre planes es, básicamente, cuánto puedes usar a Claude antes de que te pida esperar, y qué herramientas extra vienen incluidas. Toda la familia ya tiene un plan pagado (Pro o Max), así que no hay que preocuparse por las limitaciones del plan gratuito.',
      explanation:[
        'Ojo con un detalle importante: Proyectos, Artefactos, Conectores y Skills en realidad también existen en el plan gratuito. Lo que suma un plan pagado como Pro o Max es acceso a Cowork y Claude Code, más modelos entre los cuales elegir, Proyectos sin límite de cantidad, y límites de uso bastante más altos — que es justamente lo que va a permitir que usen el curso sin quedarse cortos.',
        'Cada persona de la familia entra con su propio correo — las cuentas no se comparten. Esto importa porque la Memoria y los Skills personalizados (más adelante en el curso) son individuales de cada cuenta, no compartidos automáticamente entre todos.'
      ],
      examples:[
        'Entrar a claude.ai, iniciar sesión con tu correo, y verificar en Configuración → Plan que aparece "Pro" o "Max".',
        'Si un familiar quiere que su hijo o hija tenga su propia cuenta, necesita su propio correo — no conviene compartir una sola cuenta entre varias personas.'
      ],
      pitfall:'Compartir una cuenta entre dos personas mezcla la memoria y el historial de ambos — Claude intentará recordar cosas de los dos como si fueran la misma persona. Mejor cada uno con la suya.',
      exercise:'Entra a Configuración → Plan en tu cuenta y confirma que dice Pro o Max. Si tienes dudas de qué incluye, revisa también Configuración → Uso para ver tus límites.'
    },
    {
      icon:'🖥️', title:'La pantalla: un recorrido rápido',
      tech:'La interfaz de Claude.ai se organiza en tres zonas: una barra lateral con el historial de conversaciones y los Proyectos, un panel central donde ocurre la conversación, y una caja de texto abajo para escribir, adjuntar archivos y elegir modelo.',
      simple:'Es como cualquier app de mensajería, pero con algunas cosas extra: puedes ver tus conversaciones anteriores a la izquierda, elegir qué "motor" usar antes de escribir, y adjuntar archivos con el botón del clip.',
      explanation:[

    mod.chapters.forEach(ch=>{
      const i = idx;
      if(ch.group && ch.group !== lastGroup){
        html += `<div class="subgroup-title">${ch.group}</div>`;
        lastGroup = ch.group;
      }
      const isDone = completed[i];
      html += `<button class="chapter-btn ${i===activeIndex?'active':''} ${isDone?'done':''}" onclick="goTo(${i})">
        <span class="check"></span>
        <span class="num">${i+1}</span>
        <span>${ch.icon} ${ch.title}</span>
      </button>`;
      idx++;
    });
    (UPCOMING[mod.id]||[]).forEach(title=>{
      const i = idx;
      html += `<button class="chapter-btn ${i===activeIndex?'active':''}" disabled>
        <span class="check"></span>
        <span class="num">${i+1}</span>
        <span>🔒 ${title}</span>
      </button>`;
      idx++;
    });
    html += `</div>`;
  });
  sidebar.innerHTML = html;
}

function renderContent(){
  const content = document.getElementById('content');
  const entry = flatChapters[activeIndex];
  const ch = entry.chapter;
  const c = MODULE_COLORS[entry.modId];
  const modTitle = COURSE.find(m=>m.id===entry.modId).title;

  if(ch.upcoming){
    content.innerHTML = `
      <div class="chapter-header">
        <span class="chapter-eyebrow" style="background:var(${c.soft});color:var(${c.var})">${modTitle}</span>
        <h2>🔒 ${ch.title}</h2>
      </div>
      <div class="placeholder">Este capítulo todavía no está desarrollado. Se arma en la próxima pasada del curso.</div>
      <div class="chapter-nav">
        <button class="nav-btn" onclick="goTo(${activeIndex-1})" ${activeIndex===0?'disabled':''}>← Anterior</button>
        <button class="nav-btn" onclick="goTo(${activeIndex+1})" ${activeIndex===flatChapters.length-1?'disabled':''}>Siguiente →</button>
      </div>`;
    return;
  }

  const examplesHtml = ch.examples.map(e=>`<div class="example-box">${e}</div>`).join('');
  const explanationHtml = ch.explanation.map(p=>`<p>${p}</p>`).join('');
  const isDone = completed[activeIndex];
  const eyebrowText = ch.group ? `${modTitle} · ${ch.group}` : modTitle;

  content.innerHTML = `
    <div class="chapter-header">
      <span class="chapter-eyebrow" style="background:var(${c.soft});color:var(${c.var})">${eyebrowText}</span>
      <h2>${ch.icon} ${ch.title}</h2>
    </div>

    <section class="block">
      <div class="block-label">🔬 Definición técnica</div>
      <div class="card-def"><p style="margin:0">${ch.tech}</p></div>
    </section>

    <section class="block">
      <div class="block-label">💡 En simples palabras</div>
      <p>${ch.simple}</p>
    </section>

    <section class="block">
      <div class="block-label">📖 Explicación</div>
      ${explanationHtml}
    </section>

    <section class="block">
      <div class="block-label">✅ Ejemplos</div>
      ${examplesHtml}
    </section>

    <section class="block">
      <div class="block-label">⚠️ Ojo con esto</div>
      <div class="pitfall-box">${ch.pitfall}</div>
    </section>

    <section class="block">
      <div class="block-label">🎯 Tu turno</div>
      <div class="exercise-box">
        <p>${ch.exercise}</p>
        <button class="complete-btn ${isDone?'done':''}" onclick="toggleComplete(${activeIndex})">
          ${isDone?'✓ Completado':'Marcar como completado'}
        </button>
      </div>
    </section>

    <div class="chapter-nav">
      <button class="nav-btn" onclick="goTo(${activeIndex-1})" ${activeIndex===0?'disabled':''}>← Anterior</button>
      <button class="nav-btn" onclick="goTo(${activeIndex+1})" ${activeIndex===flatChapters.length-1?'disabled':''}>Siguiente →</button>
    </div>
  `;
}

function renderProgress(){
  const developed = flatChapters.filter(f=>!f.chapter.upcoming).length;
  const doneCount = Object.keys(completed).filter(k=>completed[k]).length;
  const pct = developed>0 ? Math.round((doneCount/developed)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = doneCount+' / '+developed+' capítulos';
}

function goTo(i){
  if(i<0 || i>=flatChapters.length) return;
  if(flatChapters[i].chapter.upcoming){ activeIndex=i; renderSidebar(); renderContent(); return; }
  activeIndex = i;
  renderSidebar();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

function toggleComplete(i){
  completed[i] = !completed[i];
  renderSidebar();
  renderContent();
  renderProgress();
}

renderSidebar();
renderContent();
renderProgress();

// ---------- Modo Clase (presentación, una idea a la vez) ----------
let presoMode = false;
let presoIndex = 0;
let SLIDE_DECK = null;

function buildSlideDeck(){
  const deck = [];
  flatChapters.forEach((entry)=>{
    const ch = entry.chapter;
    if(ch.upcoming) return;
    const c = MODULE_COLORS[entry.modId];
    const modTitle = COURSE.find(m=>m.id===entry.modId).title;
    const base = {chapIdx:entry.num-1, modId:entry.modId, modTitle:modTitle, c:c, chTitle:ch.title, chIcon:ch.icon, chGroup:ch.group};
    deck.push(Object.assign({}, base, {type:'chapterTitle'}));
    deck.push(Object.assign({}, base, {type:'tech', label:'🔬 Definición técnica', text:ch.tech}));
    deck.push(Object.assign({}, base, {type:'simple', label:'💡 En simples palabras', text:ch.simple}));
    ch.explanation.forEach(p=> deck.push(Object.assign({}, base, {type:'explanation', label:'📖 Explicación', text:p})));
    ch.examples.forEach(p=> deck.push(Object.assign({}, base, {type:'example', label:'✅ Ejemplo', text:p})));
    deck.push(Object.assign({}, base, {type:'pitfall', label:'⚠️ Ojo con esto', text:ch.pitfall}));
    deck.push(Object.assign({}, base, {type:'exercise', label:'🎯 Tu turno', text:ch.exercise}));
  });
  return deck;
}

function togglePreso(){
  presoMode = !presoMode;
  const layoutEl = document.querySelector('.layout');
  const presoEl = document.getElementById('presoView');
  if(presoMode){
    if(!SLIDE_DECK) SLIDE_DECK = buildSlideDeck();
    const target = SLIDE_DECK.findIndex(s=>s.chapIdx===activeIndex);
    presoIndex = target>=0 ? target : 0;
    layoutEl.style.display = 'none';
    presoEl.classList.add('active');
    renderPreso();
  } else {
    layoutEl.style.display = 'flex';
    presoEl.classList.remove('active');
    renderSidebar();
    renderContent();
  }
}

function renderPreso(){
  const view = document.getElementById('presoView');
  const slide = SLIDE_DECK[presoIndex];
  const isDone = !!completed[slide.chapIdx];
  let bodyHtml = '';
  if(slide.type === 'chapterTitle'){
    bodyHtml = `<div class="preso-slide-inner" style="text-align:center">
      <span class="preso-title-icon">${slide.chIcon}</span>
      <div class="preso-title-text">${slide.chTitle}</div>
    </div>`;
  } else if(slide.type === 'exercise'){
    bodyHtml = `<div class="preso-slide-inner">
      <div class="preso-label" style="background:var(${slide.c.soft});color:var(${slide.c.var})">${slide.label}</div>
      <div class="preso-body card">${slide.text}</div>
      <button class="complete-btn preso-complete-btn ${isDone?'done':''}" onclick="toggleComplete(${slide.chapIdx});renderPreso();">${isDone?'✓ Completado':'Marcar como completado'}</button>
    </div>`;
  } else {
    const cardClass = slide.type === 'tech' ? ' card' : '';
    bodyHtml = `<div class="preso-slide-inner">
      <div class="preso-label" style="background:var(${slide.c.soft});color:var(${slide.c.var})">${slide.label}</div>
      <div class="preso-body${cardClass}">${slide.text}</div>
    </div>`;
  }
  const groupTxt = slide.chGroup ? (' · ' + slide.chGroup) : '';
  view.innerHTML = `
    <div class="preso-topbar">
      <div class="preso-info">${slide.modTitle}${groupTxt} — ${slide.chTitle}</div>
      <button class="preso-exit-btn" onclick="togglePreso()">Salir ✕</button>
    </div>
    <div class="preso-slide">${bodyHtml}</div>
    <div class="preso-nav">
      <button class="preso-arrow-btn" onclick="presoPrev()" ${presoIndex===0?'disabled':''}>←</button>
      <div class="preso-dots">${presoIndex+1} / ${SLIDE_DECK.length}</div>
      <button class="preso-arrow-btn" onclick="presoNext()" ${presoIndex===SLIDE_DECK.length-1?'disabled':''}>→</button>
    </div>
  `;
}

function presoNext(){
  if(presoIndex < SLIDE_DECK.length-1){
    presoIndex++;
    activeIndex = SLIDE_DECK[presoIndex].chapIdx;
    renderPreso();
    renderProgress();
  }
}
function presoPrev(){
  if(presoIndex > 0){
    presoIndex--;
    activeIndex = SLIDE_DECK[presoIndex].chapIdx;
    renderPreso();
    renderProgress();
  }
}

document.addEventListener('keydown', function(e){
  if(!presoMode) return;
  if(e.key === 'ArrowRight') presoNext();
  else if(e.key === 'ArrowLeft') presoPrev();
  else if(e.key === 'Escape') togglePreso();
});
</script>
</body>
</html>
